<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Layout Preview</title>
  <link rel="stylesheet" href="../../styles.css?v=20260614-hand-overlap-fix">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, #115745, #0b2e30);
      color: #fff8de;
      font-family: var(--font-body);
    }

    .preview-shell {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .preview-card {
      width: min(720px, calc(100vw - 48px));
      padding: 18px 18px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 34, 43, 0.72);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .preview-card h2,
    .preview-card p {
      margin: 0;
    }

    .preview-card h2 {
      font-family: var(--font-display);
      font-size: 28px;
      color: #fff2cc;
    }

    .preview-card p {
      margin-top: 6px;
      color: rgba(239, 249, 255, 0.78);
    }

    .preview-hand-panel {
      width: 100% !important;
      margin-top: 14px;
      padding: 16px 18px 14px;
      position: static !important;
      left: auto !important;
      right: auto !important;
      bottom: auto !important;
      z-index: auto !important;
      height: auto !important;
      max-height: none !important;
      display: block !important;
      overflow: visible !important;
      border-radius: 18px !important;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(245, 238, 226, 0.98)) !important;
      box-shadow: 0 8px 22px rgba(10, 30, 24, 0.18) !important;
    }

    .preview-hand-grid {
      width: 100%;
      min-height: 128px;
      padding: 0 2px 2px;
      gap: 8px;
      align-items: flex-end;
      justify-content: safe center;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .preview-hand-panel .controls,
    .preview-hand-panel .panel-head,
    .preview-hand-panel .human-summary,
    .preview-hand-panel .control-hint {
      display: none !important;
    }

    .preview-hand-grid .card-btn {
      flex: 0 0 auto;
      width: 88px;
      min-width: 88px;
      min-height: 108px;
      aspect-ratio: 18 / 25;
      padding: 5px 6px;
      border-radius: 12px;
      border-color: rgba(141, 111, 67, 0.52) !important;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.88), transparent 32%),
        linear-gradient(180deg, rgba(255, 250, 241, 0.98), rgba(243, 235, 219, 0.95)),
        #f8efdc !important;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.94),
        inset 0 0 0 1px rgba(131, 101, 60, 0.14),
        inset 0 -10px 16px rgba(25, 28, 33, 0.06),
        0 6px 14px rgba(9, 18, 16, 0.16) !important;
      opacity: 1 !important;
      filter: none !important;
      margin-left: 0;
    }

    .preview-hand-grid .card-btn::before {
      border-color: rgba(128, 99, 58, 0.34) !important;
    }

    .preview-hand-grid .card-btn.red-card {
      color: #ae4334 !important;
    }

    .preview-hand-grid .card-btn.black-card {
      color: #213039 !important;
    }

    .preview-hand-grid .card-center-suit {
      opacity: 0.92;
    }

    .preview-hand-grid .card-btn:first-child {
      margin-left: 0;
    }

    .preview-hand-grid .card-btn:nth-child(odd),
    .preview-hand-grid .card-btn:nth-child(even) {
      transform: translateY(0);
    }

    .preview-hand-grid.is-condensed {
      gap: 0 !important;
      justify-content: flex-start !important;
    }

    .preview-hand-grid.is-overlapped .card-btn {
      margin-left: calc(var(--hand-overlap, 0px) * -1);
      z-index: calc(var(--card-index, 0) + 1);
    }

    .preview-hand-grid.is-overlapped .card-btn:first-child {
      margin-left: 0;
    }

    .preview-hand-grid.is-fit {
      justify-content: safe center !important;
      overflow-x: hidden !important;
    }
  </style>
</head>
<body>
  <main class="preview-shell">
    <section class="preview-card">
      <h2>2 人模式 · 10 张手牌</h2>
      <p>贴边放不下时，自动改成重叠展示，不需要横向滚动。</p>
      <section class="human-panel preview-hand-panel">
        <div class="card-grid hand-grid preview-hand-grid">
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">2</span><span class="card-suit">♦</span></span><span class="card-center-suit">♦</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">3</span><span class="card-suit">♦</span></span><span class="card-center-suit">♦</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">K</span><span class="card-suit">♠</span></span><span class="card-center-suit">♠</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">9</span><span class="card-suit">♠</span></span><span class="card-center-suit">♠</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">6</span><span class="card-suit">♥</span></span><span class="card-center-suit">♥</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">2</span><span class="card-suit">♣</span></span><span class="card-center-suit">♣</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">8</span><span class="card-suit">♣</span></span><span class="card-center-suit">♣</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">J</span><span class="card-suit">♥</span></span><span class="card-center-suit">♥</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">Q</span><span class="card-suit">♦</span></span><span class="card-center-suit">♦</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">7</span><span class="card-suit">♣</span></span><span class="card-center-suit">♣</span></button>
        </div>
      </section>
    </section>

    <section class="preview-card">
      <h2>3 人模式 · 7 张手牌</h2>
      <p>只要牌贴着牌就能完整展示时，不做重叠。</p>
      <section class="human-panel preview-hand-panel">
        <div class="card-grid hand-grid preview-hand-grid">
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">7</span><span class="card-suit">♦</span></span><span class="card-center-suit">♦</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">3</span><span class="card-suit">♦</span></span><span class="card-center-suit">♦</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">3</span><span class="card-suit">♥</span></span><span class="card-center-suit">♥</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">7</span><span class="card-suit">♥</span></span><span class="card-center-suit">♥</span></button>
          <button class="card-btn red-card" type="button"><span class="card-corner"><span class="card-rank">5</span><span class="card-suit">♥</span></span><span class="card-center-suit">♥</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">K</span><span class="card-suit">♣</span></span><span class="card-center-suit">♣</span></button>
          <button class="card-btn black-card" type="button"><span class="card-corner"><span class="card-rank">9</span><span class="card-suit">♣</span></span><span class="card-center-suit">♣</span></button>
        </div>
      </section>
    </section>
  </main>

  <script>
    function resetPreviewHandLayout(handGrid) {
      handGrid.classList.remove("is-condensed", "is-overlapped", "is-fit");
      handGrid.style.removeProperty("gap");
      handGrid.style.removeProperty("overflow-x");
      handGrid.style.removeProperty("justify-content");
      handGrid.style.removeProperty("--hand-overlap");
    }

    function syncPreviewHandLayout(handGrid) {
      const cards = Array.from(handGrid.querySelectorAll(".card-btn"));
      if (cards.length < 2) {
        resetPreviewHandLayout(handGrid);
        return;
      }

      resetPreviewHandLayout(handGrid);

      const firstCard = cards[0];
      const gridStyle = window.getComputedStyle(handGrid);
      const cardWidth = Math.round(firstCard.getBoundingClientRect().width || 0);
      const paddingLeft = parseFloat(gridStyle.paddingLeft || "0") || 0;
      const paddingRight = parseFloat(gridStyle.paddingRight || "0") || 0;
      const baseGap = parseFloat(gridStyle.columnGap || gridStyle.gap || "0") || 0;
      const availableWidth = Math.max(handGrid.clientWidth - paddingLeft - paddingRight - 2, 0);
      const count = cards.length;
      const relaxedWidth = cardWidth * count + baseGap * Math.max(count - 1, 0);
      const touchingWidth = cardWidth * count;

      if (relaxedWidth <= availableWidth + 1) {
        return;
      }

      handGrid.classList.add("is-condensed");
      handGrid.style.setProperty("gap", "0px");
      handGrid.style.setProperty("justify-content", "flex-start");
      handGrid.style.setProperty("overflow-x", "auto");

      if (touchingWidth <= availableWidth + 1) {
        handGrid.classList.add("is-fit");
        handGrid.style.setProperty("justify-content", "safe center");
        handGrid.style.setProperty("overflow-x", "hidden");
        return;
      }

      const minVisibleWidth = Math.max(20, Math.min(Math.round(cardWidth * 0.42), cardWidth - 10));
      const maxOverlap = Math.max(0, cardWidth - minVisibleWidth);
      const requiredOverlap = Math.ceil((touchingWidth - availableWidth) / Math.max(count - 1, 1));
      const appliedOverlap = Math.max(0, Math.min(requiredOverlap, maxOverlap));
      const fittedWidth = touchingWidth - appliedOverlap * Math.max(count - 1, 0);

      if (appliedOverlap > 0) {
        handGrid.classList.add("is-overlapped");
        handGrid.style.setProperty("--hand-overlap", `${appliedOverlap}px`);
      }

      if (fittedWidth <= availableWidth + 1) {
        handGrid.classList.add("is-fit");
        handGrid.style.setProperty("justify-content", "safe center");
        handGrid.style.setProperty("overflow-x", "hidden");
      }
    }

    function syncAllPreviewHands() {
      document.querySelectorAll(".preview-hand-grid").forEach(syncPreviewHandLayout);
    }

    window.addEventListener("load", syncAllPreviewHands);
    window.addEventListener("resize", syncAllPreviewHands);
  </script>
</body>
</html>
