<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby Player Count Select Preview</title>
  <link rel="stylesheet" href="../../styles.css?v=20260614-hand-action-target-only">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #115745, #0b2e30);
      color: #fff8de;
      font-family: var(--font-body);
    }

    .preview-card {
      width: min(420px, calc(100vw - 48px));
      padding: 22px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 34, 43, 0.72);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .preview-card h2,
    .preview-card p {
      margin: 0;
    }

    .preview-card h2 {
      font-family: var(--font-display);
      font-size: 28px;
      color: #fff2cc;
    }

    .preview-card p {
      margin-top: 8px;
      color: rgba(239, 249, 255, 0.82);
    }

    .preview-field {
      margin-top: 18px;
      display: grid;
      gap: 8px;
    }

    .preview-field > span {
      color: rgba(255, 249, 224, 0.8);
      font-size: 11px;
      font-weight: 700;
    }

    .preview-shell {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 229, 150, 0.22);
      background: linear-gradient(180deg, rgba(16, 72, 91, 0.78), rgba(8, 40, 62, 0.76));
    }

    .preview-shell select {
      width: 100%;
    }

    .preview-shell .list-preview {
      margin-top: 10px;
      min-height: 104px;
    }
  </style>
</head>
<body class="is-lobby-setup">
  <main class="preview-card">
    <h2>大厅人数下拉框</h2>
    <p>校验闭合态和列表态的字号、行高不会再大到溢出面板。</p>
    <section class="preview-shell">
      <label class="preview-field">
        <span>玩家人数</span>
        <select id="player-count-preview">
          <option selected>2 人</option>
          <option>3 人</option>
          <option>4 人</option>
        </select>
      </label>
      <label class="preview-field">
        <span>列表态预览</span>
        <select class="list-preview" size="3">
          <option selected>2 人</option>
          <option>3 人</option>
          <option>4 人</option>
        </select>
      </label>
    </section>
  </main>
</body>
</html>
