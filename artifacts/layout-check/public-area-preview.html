<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Area Preview</title>
  <link rel="stylesheet" href="../../styles.css?v=20260607-side-panel-space">
  <style>
    body {
      margin: 0;
    }
  </style>
</head>
<body class="is-game-view">
  <main class="app-shell">
    <section class="game-layout">
      <div class="play-stage" id="play-stage">
        <div class="table-topbar">
          <div>
            <p class="eyebrow">Table View</p>
            <h2 class="table-title">钓红点</h2>
          </div>
          <div class="topbar-actions">
            <button class="ghost-btn" type="button">回到大厅</button>
            <button class="ghost-btn" type="button">返回对局</button>
            <button class="ghost-btn" type="button">再来一局</button>
            <button class="ghost-btn" type="button">规则说明</button>
          </div>
        </div>

        <div class="status-strip">
          <div>
            <p class="status-label">当前状态</p>
            <p class="status-value">等待操作</p>
          </div>
        </div>

        <section class="table-board">
          <div class="seat-slot seat-top">
            <div class="seat-card active">
              <h3>wilson2（好友）</h3>
              <p class="seat-meta">手牌 10 红牌 0</p>
            </div>
          </div>

          <div class="table-public-area">
            <div class="table-public-head">
              <h3>公共牌区</h3>
              <p>台面上的公共明牌</p>
            </div>
            <div class="table-public-slot">
              <div class="table-cards" id="table-cards">
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/JC.webp" alt="梅花J" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/2S.webp" alt="黑桃2" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/QH.webp" alt="红桃Q" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/9H.webp" alt="红桃9" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/KS.webp" alt="黑桃K" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/10S.webp" alt="黑桃10" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/QC.webp" alt="梅花Q" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/4C.webp" alt="梅花4" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/7H.webp" alt="红桃7" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/9S.webp" alt="黑桃9" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/AD.webp" alt="方块A" loading="lazy" draggable="false"></button>
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/3D.webp" alt="方块3" loading="lazy" draggable="false"></button>
              </div>
            </div>
          </div>

          <div class="center-stage">
            <div class="feedback-banner">你摸到了方块9，现在可以继续补抢。</div>

            <div class="draw-zone">
              <div class="draw-pile">
                <div class="draw-pile__stack" aria-hidden="true">
                  <span class="draw-pile__card"></span>
                  <span class="draw-pile__card"></span>
                  <span class="draw-pile__card"></span>
                </div>
                <div class="draw-pile__meta">
                  <span>牌堆</span>
                  <strong>24 张</strong>
                </div>
              </div>
            </div>

            <div class="action-stage">
              <div class="action-stage__meta">
                <p class="status-label">最近动作</p>
                <h3>展开发牌的动作</h3>
                <p>正在逐张翻开桌面公共牌</p>
              </div>
              <div class="action-stage__cards">
                <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/7S.webp" alt="黑桃7" loading="lazy" draggable="false"></button>
              </div>
            </div>

            <div class="selection-metrics">
              <div>
                <span>当前出牌</span>
                <strong>9 方块</strong>
              </div>
              <div>
                <span>已选台面牌</span>
                <strong>0 张</strong>
              </div>
              <div>
                <span>判定目标</span>
                <strong>需要找 A</strong>
              </div>
            </div>
          </div>
        </section>

        <section class="human-panel">
          <div class="controls">
            <div class="button-row">
              <button class="primary-btn" type="button">尝试钓牌</button>
              <button class="ghost-btn" type="button">弃到台面</button>
              <button class="ghost-btn" type="button">清空选择</button>
            </div>
          </div>
          <div class="card-grid hand-grid">
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/6D.webp" alt="方块6" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/4H.webp" alt="红桃4" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/9C.webp" alt="梅花9" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/4S.webp" alt="黑桃4" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/JD.webp" alt="方块J" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/2C.webp" alt="梅花2" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/8H.webp" alt="红桃8" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/8S.webp" alt="黑桃8" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/QD.webp" alt="方块Q" loading="lazy" draggable="false"></button>
            <button class="card-btn" type="button"><img class="card-face" src="../../assets/cards/daoist/7C.webp" alt="梅花7" loading="lazy" draggable="false"></button>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
